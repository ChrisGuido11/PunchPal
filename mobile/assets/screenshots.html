<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>PunchPal — App Store Screenshots v1.1.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #DC2626;
    --gold: #D4AF37;
    --black: #000000;
    --muted: rgba(255,255,255,0.65);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; background: #0a0a0a; color: #fff;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }
  body.export-mode { background: #000; }

  .toolbar {
    position: sticky; top: 0; z-index: 50;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: rgba(10,10,10,0.92); backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    font-size: 13px; letter-spacing: 0.02em;
  }
  body.export-mode .toolbar { display: none; }
  .toolbar h1 {
    font-family: 'Anton', Impact, sans-serif; font-weight: 400;
    letter-spacing: 0.02em; font-size: 22px; margin: 0;
  }
  .toolbar h1 span.dot { color: var(--red); }
  .tb-right { display: flex; gap: 8px; align-items: center; }
  .tb-btn {
    background: #161616; color: #fff; border: 1px solid #2a2a2a;
    padding: 8px 14px; border-radius: 6px; font: inherit; font-size: 12px;
    cursor: pointer; letter-spacing: 0.03em;
  }
  .tb-btn:hover { background: #1f1f1f; }
  .tb-btn.primary { background: var(--red); border-color: var(--red); }
  .tb-btn.primary:hover { background: #b91c1c; }

  /* THUMBNAIL STRIP — what 80% of shoppers see */
  .strip-wrap { padding: 36px 24px 60px; max-width: 1600px; margin: 0 auto; }
  .strip-title {
    font-family: 'Anton', Impact, sans-serif; font-size: 28px; letter-spacing: 0.01em;
    margin: 0 0 6px;
  }
  .strip-sub { color: var(--muted); font-size: 13px; margin: 0 0 28px; }
  .strip {
    display: flex; flex-wrap: wrap; justify-content: center;
    gap: 18px; align-items: start;
  }
  .thumb {
    width: var(--thumb-w, 220px);
    height: calc(var(--thumb-w, 220px) * 2868 / 1320);
    border-radius: 14px; overflow: hidden;
    background: #000;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    cursor: pointer; position: relative;
    transition: transform 0.18s ease;
    flex: 0 0 auto;
  }
  .thumb:hover { transform: translateY(-3px); }
  .thumb .scaled {
    width: 1320px; height: 2868px; transform-origin: top left;
    position: absolute; left: 0; top: 0;
  }
  .thumb-label {
    position: absolute; bottom: 8px; left: 10px; right: 10px;
    font-size: 10px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em;
    text-transform: uppercase; pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }

  /* FULLSIZE LIST — for review */
  .full-wrap {
    display: flex; flex-direction: column; gap: 80px;
    align-items: center; padding: 60px 0 120px;
  }
  body.export-mode .full-wrap { padding: 0; gap: 0; }

  /* The actual marketing screenshot canvas */
  .shot {
    width: 1320px; height: 2868px; position: relative;
    background: #000; overflow: hidden;
    isolation: isolate;
    flex: 0 0 auto;
  }
  body:not(.export-mode) .shot {
    /* In review mode, scale down to fit the screen */
    transform: scale(var(--review-scale, 0.32));
    transform-origin: top center;
    margin-bottom: calc(-2868px * (1 - var(--review-scale, 0.32)));
  }

  /* Red radial glow background */
  .shot .glow {
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 70% 55% at 50% 60%, rgba(220,38,38,0.22) 0%, rgba(220,38,38,0.10) 35%, rgba(0,0,0,0) 70%),
      #000;
    z-index: 0;
  }
  .shot .grain {
    position: absolute; inset: 0; opacity: 0.05; mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1; pointer-events: none;
  }

  .copyzone {
    position: absolute; left: 0; right: 0; top: 0;
    padding: var(--copy-top, 130px) 100px 0; z-index: 5;
    text-align: center;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
  }
  .headline {
    font-family: 'Anton', 'Bebas Neue', Impact, sans-serif;
    font-weight: 400;
    font-size: 116px;
    line-height: 0.95;
    letter-spacing: -0.005em;
    text-transform: uppercase;
    color: #fff;
    margin: 0;
  }
  .headline .row {
    display: block;
    white-space: nowrap;
  }
  .headline .red { color: var(--red); }
  .headline .gold { color: var(--gold); }
  .headline .uline-red {
    position: relative; display: inline-block;
  }
  .headline .uline-red::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 4px;
    height: 7px; background: var(--red); border-radius: 1px;
  }
  .headline .uline-gold {
    position: relative; display: inline-block;
  }
  .headline .uline-gold::after {
    content: ''; position: absolute; left: 0; right: 0; bottom: 4px;
    height: 7px; background: var(--gold); border-radius: 1px;
  }
  .red-dot {
    display: inline-block; width: 22px; height: 22px;
    background: var(--red); border-radius: 50%;
    vertical-align: baseline; margin-left: 6px;
  }

  .subhead {
    margin: 56px auto 0;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 34px;
    line-height: 1.38;
    color: var(--muted);
    max-width: 980px;
    letter-spacing: -0.005em;
  }
  .badge-claude {
    display: inline-flex; align-items: center; gap: 10px;
    margin-top: 28px;
    padding: 10px 18px;
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px;
    font-family: 'Inter', sans-serif;
    font-size: 22px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.03em;
  }
  .badge-claude .anth-dot {
    width: 12px; height: 12px; border-radius: 50%;
    background: #cc785c;
  }

  /* PHONE FRAME */
  .phone-stage {
    position: absolute;
    left: 50%; bottom: var(--phone-bottom, 320px);
    transform: translateX(-50%) perspective(2800px) rotateY(var(--phone-tilt, 0deg));
    z-index: 3;
    filter: drop-shadow(0 60px 60px rgba(0,0,0,0.65)) drop-shadow(0 12px 24px rgba(0,0,0,0.7));
    transition: transform 0.25s ease, bottom 0.25s ease;
  }
  .phone-stage.tilted {
    /* legacy class — now controlled via --phone-tilt */
  }
  .phone {
    position: relative;
    width: 880px;
    /* iPhone 16 Pro Max aspect ratio ~ 19.5:9, with frame */
    aspect-ratio: 880 / 1808;
    background: linear-gradient(155deg, #5a5a5d 0%, #3a3a3e 22%, #1f1f22 50%, #353539 78%, #56565a 100%);
    border-radius: 108px;
    padding: 14px;
    box-shadow:
      inset 0 0 0 1px #7a7a80,
      inset 0 0 0 3px #18181a,
      inset 0 0 0 4px #525258;
  }
  .phone-inner {
    width: 100%; height: 100%;
    background: #000;
    border-radius: 94px;
    overflow: hidden;
    position: relative;
  }
  .screen {
    position: absolute; inset: 0;
    background: #000;
    overflow: hidden;
  }
  .screen img.app {
    position: absolute;
    width: 100%; height: 100%;
    object-fit: contain;
    object-position: top center;
    display: block;
    background: #000;
  }
  /* clean status bar — sized to fully cover the source's original status bar */
  .status-bar {
    position: absolute; top: 0; left: 0; right: 0;
    height: 110px;
    z-index: 10;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 64px 0;
    color: #fff;
    font-family: -apple-system, 'SF Pro Text', 'Helvetica Neue', sans-serif;
    font-weight: 600;
    font-size: 34px;
    letter-spacing: -0.02em;
    background: linear-gradient(to bottom, #000 65%, rgba(0,0,0,0) 100%);
  }
  .status-bar.dark-bg { color: #fff; }
  .status-bar.light-bg { color: #000; }
  .status-time { padding-left: 12px; font-variant-numeric: tabular-nums; }
  .status-right { display: flex; align-items: center; gap: 8px; padding-right: 10px; }
  .status-right svg { display: block; }
  .dynamic-island {
    position: absolute; top: 26px; left: 50%; transform: translateX(-50%);
    width: 250px; height: 56px;
    background: #000;
    border-radius: 32px;
    z-index: 12;
  }

  /* Speech bubble for screenshot 3 */
  .bubble {
    position: absolute;
    right: 30px; top: 580px;
    z-index: 6;
    background: #0a0a0a;
    border: 2px solid var(--red);
    border-radius: 22px;
    padding: 20px 26px;
    font-family: 'Anton', Impact, sans-serif;
    font-size: 42px;
    line-height: 1.05;
    color: #fff;
    letter-spacing: 0.01em;
    max-width: 360px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.6), 0 0 24px rgba(220,38,38,0.25);
    transform: rotate(-3deg);
  }
  .bubble::after {
    content: '';
    position: absolute;
    left: -22px; top: 60px;
    width: 0; height: 0;
    border-top: 12px solid transparent;
    border-bottom: 12px solid transparent;
    border-right: 22px solid var(--red);
  }
  .bubble::before {
    content: '';
    position: absolute;
    left: -18px; top: 62px;
    width: 0; height: 0;
    border-top: 10px solid transparent;
    border-bottom: 10px solid transparent;
    border-right: 20px solid #0a0a0a;
    z-index: 1;
  }
  .bubble .voice-icon {
    color: var(--red); display: inline-block; margin-right: 8px; transform: translateY(-2px);
  }

  /* Eyebrow ribbon used on shots 5 / 6 */
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 24px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--red);
    margin: 0 0 28px;
  }
  .eyebrow.gold { color: var(--gold); }

  /* Bottom signature line under phone for shot 6 */
  .sig-line {
    position: absolute; left: 50%; bottom: 80px;
    transform: translateX(-50%);
    z-index: 4;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
  }

  /* When you click a thumb, show a single shot fullscreen overlay */
  .focus-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.94);
    z-index: 100;
    display: none;
    align-items: flex-start; justify-content: center;
    overflow: auto;
    padding: 40px 20px;
  }
  .focus-overlay.show { display: flex; }
  .focus-overlay .close {
    position: fixed; top: 16px; right: 20px;
    background: #161616; color: #fff; border: 1px solid #2a2a2a;
    padding: 8px 14px; border-radius: 6px; cursor: pointer;
    font: 500 12px 'Inter', sans-serif; letter-spacing: 0.03em;
  }
  .focus-overlay .shot {
    transform: scale(var(--focus-scale, 0.5));
    transform-origin: top center;
    margin-bottom: calc(-2868px * (1 - var(--focus-scale, 0.5)));
  }

  .file-cap {
    text-align: center; color: rgba(255,255,255,0.4); font-size: 11px;
    margin-top: 8px; font-family: 'JetBrains Mono', ui-monospace, monospace;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
  <div class="toolbar">
    <h1>PunchPal<span class="dot">·</span>App Store Screenshots <span style="opacity:0.4">v1.1.0</span></h1>
    <div class="tb-right">
      <button class="tb-btn" id="view-thumb">Thumbnails</button>
      <button class="tb-btn" id="view-full">Full Review</button>
    </div>
  </div>

  <div id="root"></div>

  <div class="focus-overlay" id="focus">
    <button class="close" onclick="document.getElementById('focus').classList.remove('show')">Close ✕</button>
    <div id="focus-content"></div>
  </div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
<script>
  // Defaults the user can tweak in-app, persisted via the host protocol.
  window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "phoneTilt": 0,
    "phoneBottom": 500,
    "copyTop": 130
  }/*EDITMODE-END*/;
</script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
